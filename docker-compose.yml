version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: codesync_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  server:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: codesync_server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/codesync
      - JWT_SECRET=${JWT_SECRET:-supersecretjwtkey}
      # The server needs to know it is running inside docker to map paths correctly for execution
      - DOCKER_EXECUTION=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # We must mount the server's temp directory to the exact same path on the host, 
      # otherwise the sibling execution containers won't find the source files.
      # A simple approach for production is using a named volume or specific host path.
      - code_execution_temp:/app/temp
    depends_on:
      - mongodb
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: codesync_client
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  mongodb_data:
  code_execution_temp:
